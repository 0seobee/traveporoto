<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺️ 여행 플래너</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f1a;--surface:#13162a;--card:#181c30;--border:#252940;
  --text:#e8eaf6;--sub:#7b80a0;--accent:#5c6bc0;--accent2:#7986cb;
}
body{background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;min-height:100vh}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:300;background:rgba(13,15,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 20px;gap:12px}
.nav-logo{font-size:17px;font-weight:800;cursor:pointer;white-space:nowrap}
.nav-back{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;display:none;font-family:inherit}
.nav-back:hover{background:rgba(255,255,255,.14)}
.nav-project-name{font-size:14px;font-weight:700;color:#9fa8da;display:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.nav-spacer{flex:1}
.nav-btn{background:var(--accent);color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.nav-btn:hover{background:#7986cb}

/* ── VIEWS ── */
.view{display:none;padding-top:52px;min-height:100vh}
.view.active{display:block}

/* ── DASHBOARD ── */
#dashboard{padding:32px 24px;max-width:1100px;margin:0 auto}
.dash-header{margin-bottom:28px}
.dash-title{font-size:28px;font-weight:900;margin-bottom:6px}
.dash-sub{color:var(--sub);font-size:14px}
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.project-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.project-card-cover{height:90px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.project-card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:.2s}
.project-card:hover .project-card-actions{opacity:1}
.card-action-btn{background:rgba(0,0,0,.5);border:none;color:#fff;border-radius:8px;width:26px;height:26px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.2s}
.card-action-btn:hover{background:rgba(229,57,53,.7)}
.project-card-body{padding:14px 16px}
.project-card-name{font-size:15px;font-weight:800;margin-bottom:4px}
.project-card-dest{font-size:12px;color:var(--sub);margin-bottom:6px}
.project-card-dates{font-size:11px;color:var(--accent2);background:rgba(92,107,192,.12);border-radius:10px;padding:3px 10px;display:inline-block}
.project-card-new{border:2px dashed var(--border);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:180px;color:var(--sub);font-size:14px;font-weight:600}
.project-card-new:hover{border-color:var(--accent);color:var(--accent2)}
.project-card-new .plus{font-size:32px}

/* ── PROJECT VIEW ── */
#project-view{display:none;flex-direction:column}
#project-view.active{display:flex}
.project-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px}
.project-header-emoji{font-size:28px}
.project-header-info{flex:1}
.project-header-name{font-size:18px;font-weight:800}
.project-header-meta{font-size:12px;color:var(--sub);margin-top:2px}

/* ── HERO ── */
.project-hero{position:relative;min-height:70vh;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;flex-shrink:0}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-color:#1a237e;transition:.5s}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15) 0%,rgba(0,0,0,.65) 60%,rgba(0,0,0,.85) 100%)}
.hero-body{position:relative;z-index:1;padding:40px 48px;color:#fff}
.hero-emoji{font-size:56px;margin-bottom:16px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.hero-title{font-size:clamp(32px,6vw,64px);font-weight:900;line-height:1.1;margin-bottom:10px;text-shadow:0 2px 16px rgba(0,0,0,.5)}
.hero-sub{font-size:15px;color:rgba(255,255,255,.75);margin-bottom:24px}
.hero-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:32px}
.hero-stat{background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:10px 18px;text-align:center}
.hero-stat-val{font-size:22px;font-weight:900;display:block}
.hero-stat-label{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px;display:block}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.hero-btn{border:none;border-radius:24px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;gap:6px}
.hero-btn.primary{background:#e53935;color:#fff}
.hero-btn.primary:hover{background:#ef5350}
.hero-btn.secondary{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);color:#fff}
.hero-btn.secondary:hover{background:rgba(255,255,255,.25)}
.hero-bg-btn{position:absolute;top:16px;right:16px;z-index:2;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.hero-bg-btn:hover{background:rgba(0,0,0,.6)}

/* ── TAB BAR ── */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:4px;overflow-x:auto;min-height:46px}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{border:none;background:transparent;color:var(--sub);padding:12px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;border-bottom:2px solid transparent;transition:.2s;display:flex;align-items:center;gap:5px;position:relative}
.tab-btn.on{color:#fff;border-bottom-color:var(--accent)}
.tab-btn:hover:not(.on){color:var(--text)}
.tab-del{background:rgba(229,57,53,.15);border:none;color:#ef9a9a;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;margin-left:2px;font-family:inherit}
.tab-btn:hover .tab-del{display:flex}
.tab-add-btn{border:1px dashed var(--border);background:transparent;color:var(--sub);border-radius:16px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;margin-left:8px;transition:.2s}
.tab-add-btn:hover{border-color:var(--accent);color:var(--accent2)}

/* ── TAB CONTENT ── */
.tab-content{flex:1;overflow:auto}
.tab-pane{display:none;height:100%}
.tab-pane.active{display:block}

/* ── COMMON SECTION ── */
.pane-wrap{padding:24px;max-width:1000px;margin:0 auto}
.pane-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.pane-title{font-size:18px;font-weight:800}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.add-btn:hover{background:#7986cb}
.del-btn{background:rgba(229,57,53,.12);border:1px solid rgba(229,57,53,.25);color:#ef9a9a;border-radius:8px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;transition:.2s}
.del-btn:hover{background:rgba(229,57,53,.25)}

/* ── FORM ── */
.form-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.form-row:last-child{margin-bottom:0}
.f-inp{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;font-family:inherit;outline:none;flex:1;min-width:120px}
.f-inp:focus{border-color:var(--accent)}
.f-inp::placeholder{color:var(--sub)}
.f-sel{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;font-family:inherit;cursor:pointer}
.f-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.f-btn:hover{background:#7986cb}
.f-btn.secondary{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text)}
.f-btn.secondary:hover{background:rgba(255,255,255,.1)}
textarea.f-inp{resize:vertical;min-height:60px}

/* ── CHECKLIST ── */
.cl-list{display:flex;flex-direction:column;gap:6px}
.cl-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s}
.cl-item:hover{border-color:var(--accent)}
.cl-item.done{opacity:.5}
.cl-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:.2s}
.cl-item.done .cl-check{background:var(--accent);border-color:var(--accent);color:#fff}
.cl-text{flex:1;font-size:13px}
.cl-item.done .cl-text{text-decoration:line-through}
.cl-cat-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(92,107,192,.15);color:var(--accent2)}

/* ── LIST (TABLE) ── */
.list-table{width:100%;border-collapse:collapse;margin-top:8px}
.list-table th{background:rgba(0,0,0,.25);padding:9px 12px;font-size:11px;color:var(--sub);text-align:left;border-bottom:1px solid var(--border)}
.list-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;vertical-align:middle}
.list-table tr:hover td{background:rgba(255,255,255,.02)}
.list-done-toggle{cursor:pointer;font-size:16px}
.list-done{opacity:.45;text-decoration:line-through}

/* ── CARD ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:.2s}
.info-card:hover{border-color:var(--accent)}
.info-card-img{width:100%;height:130px;object-fit:cover;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--sub)}
.info-card-img img{width:100%;height:100%;object-fit:cover}
.info-card-body{padding:12px 14px}
.info-card-title{font-size:14px;font-weight:700;margin-bottom:4px}
.info-card-desc{font-size:12px;color:var(--sub);line-height:1.5;margin-bottom:8px}
.info-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(92,107,192,.15);color:var(--accent2)}
.info-card-link{font-size:11px;color:var(--accent2);text-decoration:none}
.info-card-link:hover{text-decoration:underline}
.info-card-actions{display:flex;gap:6px;margin-top:8px}

#schedSheetBox.open{display:flex!important}
.pay-toggle{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--sub);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;white-space:nowrap}
.pay-toggle.on{background:rgba(92,107,192,.25);border-color:var(--accent);color:#fff}
.sched-cost-bar{background:rgba(92,107,192,.08);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;font-size:12px}
.sched-cost-item{display:flex;align-items:center;gap:5px}
.sched-cost-label{color:var(--sub);font-weight:600}
.sched-cost-val{font-weight:800;color:var(--text)}
.sched-cost-cash{color:#66bb6a}
.sched-cost-card{color:#42a5f5}
/* ── SCHEDULE ── */
.sched-dates{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.date-tab{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.date-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.date-tab-del{background:none;border:none;color:inherit;cursor:pointer;font-size:11px;opacity:.6;padding:0}
.date-tab-del:hover{opacity:1}
.sched-timeline{display:flex;flex-direction:column;gap:10px}
.sched-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;gap:14px;align-items:flex-start}
.sched-time{font-size:13px;font-weight:800;color:var(--accent2);min-width:50px;text-align:center;padding-top:2px}
.sched-body{flex:1}
.sched-place{font-size:14px;font-weight:700;margin-bottom:3px}
.sched-content{font-size:13px;color:var(--sub);line-height:1.5}
.sched-note{font-size:11px;color:#7986cb;margin-top:4px;background:rgba(92,107,192,.08);border-radius:6px;padding:4px 8px;display:inline-block}
.sched-cost{font-size:11px;color:#a5d6a7;margin-top:4px}
.sched-item-actions{display:flex;gap:4px;flex-shrink:0}

/* ── MAP ── */
.map-wrap{display:flex;flex-direction:column;height:calc(100vh - 160px)}
.map-layer-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.map-layer-btn{border:none;border-radius:16px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;opacity:.45;color:#fff}
.map-layer-btn.on{opacity:1}
.map-layout{display:grid;grid-template-columns:1fr 300px;gap:0;flex:1;overflow:hidden}
@media(max-width:768px){.map-layout{grid-template-columns:1fr}}
#tab-map-el{width:100%;height:100%;min-height:400px}
.map-sidebar{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.map-sidebar-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.map-sidebar-header .badge{font-size:11px;background:rgba(92,107,192,.2);color:var(--accent2);border-radius:10px;padding:1px 8px}
.map-kml-btn{margin-left:auto;background:rgba(92,107,192,.15);border:1px solid var(--accent);color:var(--accent2);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.2s}
.map-kml-btn:hover{background:rgba(92,107,192,.3)}
.map-place-list{flex:1;overflow-y:auto;padding:8px}
.map-place-list::-webkit-scrollbar{width:4px}
.map-place-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.map-place-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:.2s}
.map-place-item:hover{border-color:var(--accent)}
.map-place-name{font-size:13px;font-weight:700;margin-bottom:2px}
.map-place-desc{font-size:11px;color:var(--sub)}
.map-place-layer{display:inline-block;font-size:10px;font-weight:700;border-radius:8px;padding:1px 7px;color:#fff;margin-top:4px}
.map-add-form{padding:12px;border-top:1px solid var(--border)}
.map-add-form .f-inp{margin-bottom:6px;width:100%}
.map-coord-row{display:flex;gap:6px;margin-bottom:6px}
.map-coord-hint{font-size:10px;color:var(--sub);margin-bottom:6px}

/* ── FILE ── */
.file-list{display:flex;flex-direction:column;gap:8px}
.file-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.file-icon{font-size:28px;flex-shrink:0}
.file-info{flex:1}
.file-name{font-size:14px;font-weight:700;margin-bottom:2px}
.file-meta{font-size:11px;color:var(--sub)}
.file-link{font-size:12px;color:var(--accent2);text-decoration:none;display:block;margin-top:4px;word-break:break-all}
.file-link:hover{text-decoration:underline}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:800;margin-bottom:20px}
.modal-label{font-size:12px;color:var(--sub);margin-bottom:6px;display:block;font-weight:600}
.modal-inp{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:10px 14px;font-family:inherit;outline:none;margin-bottom:14px}
.modal-inp[type="date"]{color-scheme:dark;color:#e8eaf6}
.modal-inp:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:4px}
.modal-btn{flex:1;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.modal-btn.primary{background:var(--accent);color:#fff}
.modal-btn.primary:hover{background:#7986cb}
.modal-btn.cancel{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text)}
.modal-btn.cancel:hover{background:rgba(255,255,255,.1)}

/* ── TAB TYPE SELECTOR ── */
.tab-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.tab-type-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:.2s}
.tab-type-card:hover,.tab-type-card.on{border-color:var(--accent);background:rgba(92,107,192,.1)}
.tab-type-card .icon{font-size:24px;margin-bottom:6px}
.tab-type-card .label{font-size:12px;font-weight:700}

/* ── EMOJI PICKER ── */
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.emoji-opt{font-size:24px;cursor:pointer;padding:4px;border-radius:8px;transition:.2s}
.emoji-opt:hover,.emoji-opt.on{background:rgba(92,107,192,.2)}

/* ── COLOR PICKER ── */
.color-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.color-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.2s}
.color-opt:hover,.color-opt.on{border-color:#fff}

/* ── PROGRESS BAR ── */
.progress-bar-wrap{background:var(--surface);border-radius:20px;height:6px;margin-bottom:16px;overflow:hidden}
.progress-bar{background:var(--accent);height:100%;border-radius:20px;transition:.4s}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 24px;color:var(--sub)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* ── MISC ── */
.badge{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(92,107,192,.15);color:var(--accent2);font-weight:700}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="hub.html" style="background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap">← 허브</a>
  <div class="nav-logo" onclick="goHome()">🗺️ 여행 플래너</div>
  <button class="nav-back" id="navBack" onclick="goHome()">← 목록</button>
  <div class="nav-project-name" id="navProjectName"></div>
  <div class="nav-spacer"></div>
  <button class="nav-btn" id="navMainBtn" onclick="openProjectModal()">+ 새 여행</button>
</nav>

<!-- DASHBOARD -->
<div class="view active" id="dashboard">
  <div style="padding:32px 24px;max-width:1100px;margin:0 auto">
    <div class="dash-header">
      <div class="dash-title">내 여행 프로젝트</div>

async function loadWikiImages(dest, preview) {
  // 로딩 표시
  preview.innerHTML = `<div style="color:#7b80a0;font-size:12px;padding:8px 0">🔍 이미지 검색 중...</div>`;
  try {
    // Wikipedia 검색으로 관련 페이지 찾기
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(dest)}&srlimit=3&format=json&origin=*`;
    const searchRes = await fetch(searchUrl);
    const searchData = await searchRes.json();
    const pages = searchData.query?.search || [];
    if (!pages.length) { preview.innerHTML = `<div style="color:#7b80a0;font-size:12px">이미지를 찾을 수 없습니다</div>`; return; }

    const titles = pages.map(p => encodeURIComponent(p.title)).join('|');
    const imgUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${titles}&prop=pageimages&format=json&pithumbsize=1200&piprop=thumbnail&origin=*`;
    const imgRes = await fetch(imgUrl);
    const imgData = await imgRes.json();
    const pageObjs = Object.values(imgData.query?.pages || {});
    const images = pageObjs.filter(p => p.thumbnail?.source).map(p => ({
      thumb: p.thumbnail.source.replace(/\/\d+px-/, '/200px-'),
      full: p.thumbnail.source  // 1200px 요청했으므로 그대로 사용
    }));

    preview.innerHTML = '';
    if (!images.length) { preview.innerHTML = `<div style="color:#7b80a0;font-size:12px">이미지를 찾을 수 없습니다</div>`; return; }

    images.forEach(img => {
      const el = document.createElement('img');
      el.src = img.thumb;
      el.style.cssText = 'width:calc(33% - 4px);height:64px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:.15s';
      el.title = '이 이미지로 설정';
      el.onclick = () => applyBgUrl(img.full);
      el.onmouseover = () => el.style.borderColor = '#7986cb';
      el.onmouseout = () => el.style.borderColor = 'transparent';
      preview.appendChild(el);
    });

    // 자동 설정 버튼도 첫 번째 이미지로 연결
    const btn = document.getElementById('bgAutoBtn');
    if (btn && images[0]) {
      btn.onclick = () => applyBgUrl(images[0].full);
      btn.disabled = false;
    }
  } catch(e) {
    preview.innerHTML = `<div style="color:#ef9a9a;font-size:12px">이미지 로드 실패</div>`;
  }
}

async function uploadHeroBg(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const reader = new FileReader();
  reader.onload = async e => {
    const base64 = e.target.result;
    await sbPatch('projects', currentProject.id, { cover_bg: base64 });
    currentProject.cover_bg = base64;
    const el = document.getElementById('heroBgEl');
    if (el) el.style.backgroundImage = `url('${base64}')`;
  };
  reader.readAsDataURL(file);
}

// ── Tabs ──
async function loadTabs() {
  tabs = await sbGet('tabs', `project_id=eq.${currentProject.id}&order=sort_order.asc,created_at.asc`);
  renderTabBar();
  // 히어로 화면에서 탭 자동 열기 하지 않음 — openProject에서 showProjectHero() 호출
}

function renderTabBar() {
  const bar = document.getElementById('tabBar');
  const btnHtml = tabs.map(t => `
    <button class="tab-btn" id="tab-btn-${t.id}" data-id="${t.id}" onclick="openTab('${t.id}')">
      ${TAB_ICONS[t.type]||'📄'} ${t.title}
      <span class="tab-del" onclick="event.stopPropagation();deleteTab('${t.id}')">✕</span>
    </button>`).join('');

function openTabModal() {
  selectedTabType = 'schedule';
  document.querySelectorAll('.tab-type-card').forEach(x=>x.classList.remove('on'));
  document.querySelector('[data-type="schedule"]').classList.add('on');

async function saveTab() {
  const title = document.getElementById('tabTitle').value.trim() ||
    { schedule:'일정', checklist:'체크리스트', list:'리스트', card:'카드', map:'지도', file:'파일' }[selectedTabType];

async function deleteTab(id) {
  if (!confirm('이 탭을 삭제하시겠습니까? 탭 안의 데이터도 삭제됩니다.')) return;
  await sbDelete('tabs', id);
  await loadTabs();
}

async function openTab(id) {
  currentTab = tabs.find(t => t.id === id);
  if (!currentTab) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById(`tab-btn-${id}`);
  if (btn) btn.classList.add('on');

}

// ── Tab Content Renderer ──
async function renderTabContent(tab) {
  const container = document.getElementById('tabContent');
  const items = await sbGet('tab_items', `tab_id=eq.${tab.id}&order=sort_order.asc,created_at.asc`);

  if (tab.type === 'schedule') await renderSchedule(container, tab, items);
  else if (tab.type === 'checklist') renderChecklist(container, tab, items);
  else if (tab.type === 'list') renderList(container, tab, items);
  else if (tab.type === 'card') renderCards(container, tab, items);
  else if (tab.type === 'map') renderMap(container, tab, items);
  else if (tab.type === 'file') renderFiles(container, tab, items);
  else if (tab.type === 'budget') renderBudget(container, tab, items);
}

// ── SCHEDULE ──
let schedDates = [], currentSchedDate = null, currentPayMethod = 'cash';

  currentSchedDate = schedDates[0] || null;

  container.innerHTML = `<div class="pane-wrap">
    <div class="pane-header">
      <div class="pane-title">📅 ${tab.title}</div>
      <div style="display:flex;gap:8px">
        <button class="add-btn" style="font-size:12px;background:rgba(92,107,192,.2);border:1px solid var(--accent)" onclick="document.getElementById('schedXlsInput').click()">📊 Excel 가져오기</button>
        <button class="add-btn" style="font-size:12px;background:rgba(92,107,192,.2);border:1px solid var(--accent)" onclick="document.getElementById('schedSheetBox').classList.toggle('open')">🔗 구글시트 연결</button>
      </div>
    </div>
    <input type="file" id="schedXlsInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="importSchedExcel(this,'${tab.id}')">

      <div style="display:flex;gap:8px">
        <input class="f-inp" id="schedSheetUrl" placeholder="https://docs.google.com/spreadsheets/d/..." style="flex:1">

      </div>
    </div>

    <div class="form-box" style="margin-top:20px">

      <div class="form-row">

function renderSchedDates(items) {
  // items가 있으면 그 날짜로 갱신, 없으면 기존 schedDates 유지
  if (items.length > 0) {
    const fromItems = [...new Set(items.map(i => i.data.date).filter(Boolean))].sort();
    // 로컬에서 추가된 날짜도 병합
    schedDates = [...new Set([...fromItems, ...schedDates])].sort();
  }
  const el = document.getElementById('schedDates');
  if (!el) return;
  el.innerHTML = schedDates.map(d =>
    `<div class="date-tab${d===currentSchedDate?' on':''}" onclick="switchSchedDate('${d}', this)">
      ${d}
    </div>`
  ).join('') + `<button class="add-btn" style="font-size:11px;padding:5px 12px" onclick="addSchedDate()">＋ 날짜</button>`;
}

async function switchSchedDate(d, el) {
  document.querySelectorAll('.date-tab').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  currentSchedDate = d;
  fillSchedDateInputs(d);
  const items = await sbGet('tab_items', `tab_id=eq.${currentTab.id}&order=sort_order.asc,created_at.asc`);
  renderSchedItems(items, d);
}

function fillSchedDateInputs(d) {
  if (!d) return;
  const m = d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) {
    const y = document.getElementById('sDateY'); if(y) y.value = m[1];
    const mo = document.getElementById('sDateM'); if(mo) mo.value = m[2];
    const day = document.getElementById('sDateD'); if(day) day.value = m[3];
  }
  // YYYY-MM-DD 형식이 아니면(예: 1일차) 날짜 칸은 비워둠
}

function addSchedDate() {
  // 기존 팝업 있으면 제거
  const existing = document.getElementById('datePickerPop');
  if (existing) { existing.remove(); return; }

  const btn = event.currentTarget;
  const pop = document.createElement('div');
  pop.id = 'datePickerPop';
  pop.style.cssText = 'position:absolute;z-index:999;background:#1e2240;border:1px solid #3a3f6b;border-radius:12px;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:8px;min-width:220px';

  const rect = btn.getBoundingClientRect();
  pop.style.top = (rect.bottom + window.scrollY + 6) + 'px';
  pop.style.left = rect.left + 'px';

  pop.innerHTML = `
    <div style="font-size:12px;font-weight:700;color:#9fa8da;margin-bottom:4px">날짜 추가</div>
    <div style="display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid #3a3f6b;border-radius:8px;padding:7px 12px">
      <input id="dpY" maxlength="4" placeholder="YYYY" inputmode="numeric"
        style="background:none;border:none;color:#e8eaf6;font-size:15px;font-weight:700;width:48px;outline:none;text-align:center;font-family:inherit">
      <span style="color:#5c6bc0;font-weight:700">-</span>
      <input id="dpM" maxlength="2" placeholder="MM" inputmode="numeric"
        style="background:none;border:none;color:#e8eaf6;font-size:15px;font-weight:700;width:30px;outline:none;text-align:center;font-family:inherit">
      <span style="color:#5c6bc0;font-weight:700">-</span>
      <input id="dpD" maxlength="2" placeholder="DD" inputmode="numeric"
        style="background:none;border:none;color:#e8eaf6;font-size:15px;font-weight:700;width:30px;outline:none;text-align:center;font-family:inherit">
    </div>
    <input id="datePickerLabel" placeholder="또는 직접 입력 (예: 1일차)" style="background:rgba(255,255,255,.06);border:1px solid #3a3f6b;border-radius:8px;color:#e8eaf6;font-size:13px;padding:7px 10px;font-family:inherit;outline:none;width:100%">
    <button onclick="confirmAddSchedDate()" style="background:#5c6bc0;color:#fff;border:none;border-radius:8px;padding:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%">추가</button>
  `;

  document.body.appendChild(pop);

  const dpY = pop.querySelector('#dpY');
  const dpM = pop.querySelector('#dpM');
  const dpD = pop.querySelector('#dpD');
  dpY.focus();

  // 숫자만 허용
  [dpY, dpM, dpD].forEach(el => el.addEventListener('keypress', e => { if (!/\d/.test(e.key)) e.preventDefault(); }));

  // 자동 포커스 이동
  dpY.addEventListener('input', () => { if (dpY.value.length === 4) dpM.focus(); });
  dpM.addEventListener('input', () => {
    if (dpM.value.length === 2) { dpD.focus(); return; }
    if (dpM.value.length === 1 && parseInt(dpM.value) > 1) { dpM.value = '0' + dpM.value; dpD.focus(); }
  });
  dpD.addEventListener('input', () => {
    if (dpD.value.length === 1 && parseInt(dpD.value) > 3) dpD.value = '0' + dpD.value;
  });

  // 외부 클릭 시 닫기
  setTimeout(() => document.addEventListener('click', function outsideClick(e) {
    if (!pop.contains(e.target) && e.target !== btn) { pop.remove(); document.removeEventListener('click', outsideClick); }
  }), 100);
}

function confirmAddSchedDate() {
  const y = document.getElementById('dpY')?.value;
  const m = document.getElementById('dpM')?.value;
  const d = document.getElementById('dpD')?.value;
  const dateStr = (y && m && d) ? `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}` : '';
  const label = document.getElementById('datePickerLabel')?.value.trim() || dateStr;
  document.getElementById('datePickerPop')?.remove();
  if (!label) return;
  if (!schedDates.includes(label)) schedDates.push(label);
  currentSchedDate = label;
  // sDate 기본값 설정
  const dateInput = document.getElementById('sDate');
  if (dateInput && label.match(/^\d{4}-\d{2}-\d{2}$/)) dateInput.value = label;
  renderSchedDates([]);
}

function renderSchedItems(items, date) {
  const el = document.getElementById('schedItems');
  if (!el) return;
  const sym = { KRW:'₩', EUR:'€', USD:'$', JPY:'¥' };
  const filtered = date ? items.filter(i => i.data.date === date) : items;
  renderCostBar(filtered, date, items);
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📅</div><p>일정을 추가해 보세요</p></div>`;
    return;
  }
  el.innerHTML = `<div class="sched-timeline">${
    filtered.sort((a,b)=>(a.data.time||'').localeCompare(b.data.time||'')).map(item => {
      const costVal = item.data.cost ? parseFloat(item.data.cost) : 0;
      const cur = item.data.currency || 'KRW';
      const pay = item.data.payMethod || '';
      const payBadge = pay==='cash'?'<span style="color:#66bb6a;font-size:10px;font-weight:700">현금</span>':pay==='card'?'<span style="color:#42a5f5;font-size:10px;font-weight:700">카드</span>':'';
      const costStr = costVal ? `${sym[cur]||cur}${costVal.toLocaleString()} ${payBadge}` : '';

        <div class="sched-time">${item.data.time||''}</div>

          ${costStr?`<div class="sched-cost">💰 ${costStr}</div>`:''}

          <button class="del-btn" onclick="deleteItem('${item.id}','${currentTab.id}')">삭제</button>

  }</div>`;
}

function setPayMethod(method) {
  currentPayMethod = method;
  document.getElementById('sPayCash').classList.toggle('on', method === 'cash');
  document.getElementById('sPayCard').classList.toggle('on', method === 'card');
}

function calcSchedCost(items, date) {
  const filtered = date ? items.filter(i => i.data.date === date) : items;
  const result = {};
  filtered.forEach(item => {
    const c = item.data.cost;
    if (!c || isNaN(parseFloat(c))) return;
    const cur = item.data.currency || 'KRW';
    const pay = item.data.payMethod || 'cash';
    if (!result[cur]) result[cur] = { cash: 0, card: 0 };
    result[cur][pay] += parseFloat(c);
  });
  return result;
}

function renderCostBar(items, date, allItems) {
  const daily = calcSchedCost(items, date);
  const total = calcSchedCost(allItems, null);
  const fmt = (v, cur) => {
    if (cur === 'KRW' || cur === 'JPY') return Math.round(v).toLocaleString();
    return v.toFixed(2);
  };
  const sym = { KRW:'₩', EUR:'€', USD:'$', JPY:'¥' };

  const dailyHtml = Object.entries(daily).map(([cur, v]) =>
    `<span class="sched-cost-item"><span class="sched-cost-label">${sym[cur]||cur} 일별</span>
    <span class="sched-cost-cash">현금 ${fmt(v.cash,cur)}</span>
    <span style="color:var(--sub)">·</span>
    <span class="sched-cost-card">카드 ${fmt(v.card,cur)}</span></span>`
  ).join('');

  const totalHtml = Object.entries(total).map(([cur, v]) =>
    `<span class="sched-cost-item"><span class="sched-cost-label">${sym[cur]||cur} 전체</span>
    <span class="sched-cost-val">${fmt(v.cash+v.card,cur)}</span></span>`
  ).join('');

  const bar = document.getElementById('schedCostBar');
  if (bar) bar.innerHTML = dailyHtml + (totalHtml ? `<span style="margin-left:auto;opacity:.5">│</span>${totalHtml}` : '');
}

async function addSchedItem(tabId) {
  const date = currentSchedDate || '';
  const h = document.getElementById('sTimeH').value.padStart(2,'0');
  const mn = document.getElementById('sTimeM').value.padStart(2,'0');
  const time = (h !== '00' || mn !== '00') ? `${h}:${mn}` : '';
  const place = document.getElementById('sPlace').value.trim();
  const content = document.getElementById('sContent').value.trim();
  const cost = document.getElementById('sCost').value.trim();
  const currency = document.getElementById('sCurrency').value;
  const payMethod = currentPayMethod;
  const note = document.getElementById('sNote').value.trim();
  if (!place && !content) { alert('장소 또는 내용을 입력하세요'); return; }
  await sbPost('tab_items', { tab_id: tabId, data: { date, time, place, content, cost, currency, payMethod, note }, sort_order: 0 });
  ['sTimeH','sTimeM','sPlace','sContent','sCost','sNote'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const items = await sbGet('tab_items', `tab_id=eq.${tabId}&order=sort_order.asc,created_at.asc`);
  renderSchedDates(items);
  if (date) currentSchedDate = date;
  renderSchedItems(items, currentSchedDate);
}

// ── 일정 Excel/구글시트 가져오기 ──
const SCHED_COL_MAP = {
  date:    ['날짜','date','일자','day'],
  time:    ['시간','time','출발','시각'],
  place:   ['장소','place','위치','location','목적지'],
  content: ['내용','일정','content','활동','activity','title','제목'],
  cost:    ['비용','금액','cost','price','예산','예상비용'],
  note:    ['메모','노트','note','비고','memo','remark'],
};

function detectCols(headers) {
  const map = {};
  headers.forEach((h, i) => {
    const norm = (h||'').toString().trim().toLowerCase();
    for (const [field, keywords] of Object.entries(SCHED_COL_MAP)) {
      if (!map[field] && keywords.some(k => norm.includes(k))) map[field] = i;
    }
  });
  return map;
}

function rowsToItems(rows, colMap) {
  return rows.map(row => {
    const get = f => (colMap[f] !== undefined ? (row[colMap[f]]||'').toString().trim() : '');
    const date = get('date');
    const time = get('time').replace(/[^0-9:]/g,'').slice(0,5);
    const place = get('place');
    const content = get('content');
    const cost = get('cost');
    const note = get('note');
    if (!date && !place && !content) return null;
    return { date, time, place, content, cost, note };
  }).filter(Boolean);
}

async function importSchedExcel(input, tabId) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data, { type: 'array', cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  if (rows.length < 2) { alert('데이터가 없습니다.'); return; }
  const colMap = detectCols(rows[0]);
  const items = rowsToItems(rows.slice(1), colMap);
  await batchInsertSchedItems(items, tabId);
}

async function importSchedSheet(tabId) {
  const url = document.getElementById('schedSheetUrl').value.trim();
  if (!url) return;
  const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (!m) { alert('올바른 구글 시트 URL이 아닙니다.'); return; }
  const id = m[1];
  const gidMatch = url.match(/gid=(\d+)/);
  const gid = gidMatch ? gidMatch[1] : '0';
  const csvUrl = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
  try {
    const res = await fetch(csvUrl);
    if (!res.ok) throw new Error('fetch 실패');
    const text = await res.text();
    const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/^"|"$/g,'').trim()));
    if (rows.length < 2) { alert('데이터가 없습니다.'); return; }
    const colMap = detectCols(rows[0]);
    const items = rowsToItems(rows.slice(1), colMap);
    await batchInsertSchedItems(items, tabId);
    document.getElementById('schedSheetBox').classList.remove('open');
    document.getElementById('schedSheetUrl').value = '';
  } catch(e) {
    alert('가져오기 실패.\n시트가 "링크가 있는 모든 사용자" 공개인지 확인해 주세요.');
  }
}

// ── 장소 검색 (Nominatim) ──
let placeSearchTimer = null;
async function searchPlace(q) {
  clearTimeout(placeSearchTimer);
  const dd = document.getElementById('placeDropdown');
  if (!q || q.length < 2) { dd.innerHTML = ''; return; }
  placeSearchTimer = setTimeout(async () => {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&accept-language=ko`, {
        headers: { 'Accept-Language': 'ko' }
      });
      const data = await res.json();
      if (!data.length) { dd.innerHTML = `<div style="padding:10px 14px;font-size:12px;color:#7b80a0">검색 결과 없음</div>`; return; }
      dd.innerHTML = data.map(p => {
        const name = p.display_name.split(',').slice(0,3).join(', ');
        return `<div onclick="selectPlace('${p.display_name.replace(/'/g,"\\'")}',${p.lat},${p.lon})"
          style="padding:9px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #2a2f50;transition:.15s"
          onmouseover="this.style.background='rgba(92,107,192,.2)'" onmouseout="this.style.background=''">${name}</div>`;
      }).join('');
    } catch(e) { dd.innerHTML = ''; }
  }, 350);
}

function getLayerColor(layer) {
  if (!layer) return '#5c6bc0';
  if (!mapLayerColors[layer]) {
    const idx = Object.keys(mapLayerColors).length % LAYER_PALETTE.length;
    mapLayerColors[layer] = LAYER_PALETTE[idx];
  }
  return mapLayerColors[layer];
}

function toggleMapLayer(btn, layer) {
  btn.classList.toggle('on');
  if (mapActiveLayers.has(layer)) mapActiveLayers.delete(layer);
  else mapActiveLayers.add(layer);
  Object.entries(lMarkers).forEach(([id, m]) => {
    const item = mapAllItems.find(i=>i.id===id);
    const l = item?.data?.layer || '';
    if (mapActiveLayers.has(l) || (!l && mapActiveLayers.has(''))) m.addTo(leafletMap);
    else if (leafletMap.hasLayer(m)) leafletMap.removeLayer(m);
  });
  const visible = mapAllItems.filter(i => mapActiveLayers.has(i.data.layer||''));
  document.getElementById('mapCount').textContent = `${visible.length}곳`;
  // 목록도 필터
  mapAllItems.forEach(item => {
    const el = document.getElementById('mpi-'+item.id);
    if (el) el.style.display = mapActiveLayers.has(item.data.layer||'') ? '' : 'none';
  });
}

function initLeafletTab(items, tabId) {
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  leafletMap = window.leafletMap = L.map('tab-map-el').setView([37.5665, 126.9780], 5);
  L.tileLayer('https://mt{s}.google.com/vt/lyrs=m&hl=ko&x={x}&y={y}&z={z}', {
    maxZoom:20, subdomains:['0','1','2','3']
  }).addTo(leafletMap);
  leafletMap.on('click', e => {
    document.getElementById('mLat').value = e.latlng.lat.toFixed(6);
    document.getElementById('mLng').value = e.latlng.lng.toFixed(6);
  });
  lMarkers = {};
  items.forEach(item => addLeafletMarker(item));
  if (items.length > 0) {
    const lats = items.map(i=>i.data.lat), lngs = items.map(i=>i.data.lng);
    leafletMap.fitBounds([[Math.min(...lats),Math.min(...lngs)],[Math.max(...lats),Math.max(...lngs)]], {padding:[30,30]});
  }
}

function addLeafletMarker(item) {
  if (!item.data.lat || !item.data.lng) return;
  const color = getLayerColor(item.data.layer||'');
  const icon = L.divIcon({
    html:`<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,
    className:'', iconSize:[12,12], iconAnchor:[6,6]
  });
  const m = L.marker([item.data.lat, item.data.lng], { icon })
    .bindPopup(`<b>${item.data.name||''}</b>${item.data.layer?'<br><small>'+item.data.layer+'</small>':''}${item.data.desc?'<br>'+item.data.desc:''}`)
    .addTo(leafletMap);
  lMarkers[item.id] = m;
}

function focusMarker(lat, lng) {
  if (leafletMap && lat && lng) leafletMap.setView([lat, lng], 15);
}

// ── KML 가져오기 ──
async function importKML(input, tabId) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  let text;
  if (file.name.toLowerCase().endsWith('.kmz')) {
    // KMZ = ZIP 압축 해제 후 doc.kml 추출
    const zip = await JSZip.loadAsync(await file.arrayBuffer());
    const kmlFile = zip.file(/\.kml$/i)[0];
    if (!kmlFile) { alert('KMZ 안에 KML 파일이 없습니다.'); return; }
    text = await kmlFile.async('text');
  } else {
    text = await file.text();
  }

  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'text/xml');

  const places = [];

  // 태그명으로 첫 번째 자식 텍스트 반환 (네임스페이스 무관)
  function childText(el, tag) {
    const els = el.getElementsByTagName(tag);
    for (let i = 0; i < els.length; i++) {
      if (els[i].parentNode === el) return els[i].textContent.trim();
    }
    return '';
  }

  // Placemark에서 장소 정보 추출
  function extractPlace(pm, layerName) {
    const name = childText(pm, 'name') || '이름 없음';
    const descEls = pm.getElementsByTagName('description');
    const desc = descEls.length ? descEls[0].textContent.replace(/<[^>]+>/g, '').trim() : '';
    // 좌표: lng,lat,alt 형식
    const coordEls = pm.getElementsByTagName('coordinates');
    if (!coordEls.length) return null;
    const parts = coordEls[0].textContent.trim().split(/[\s,]+/);
    const lng = parseFloat(parts[0]);
    const lat = parseFloat(parts[1]);
    if (isNaN(lat) || isNaN(lng)) return null;
    return { name, desc, lat, lng, layer: layerName };
  }

  // Folder를 재귀적으로 순회
  function parseFolder(folder, defaultLayer) {
    const layerName = childText(folder, 'name') || defaultLayer;
    for (const child of folder.children) {
      const tag = child.localName || child.tagName;
      if (tag === 'Placemark') {
        const p = extractPlace(child, layerName);
        if (p) places.push(p);
      } else if (tag === 'Folder') {
        parseFolder(child, layerName);
      }
    }
  }

  // NetworkLink 감지 → href에서 실제 KML 로드
  const netLinks = xml.getElementsByTagName('NetworkLink');
  if (netLinks.length > 0 && places.length === 0) {
    const hrefEls = xml.getElementsByTagName('href');
    const urls = [];
    for (let i = 0; i < hrefEls.length; i++) {
      const u = hrefEls[i].textContent.trim();
      if (u.startsWith('http')) urls.push(u);
    }
    if (urls.length === 0) { alert('NetworkLink URL을 찾지 못했습니다.'); return; }

    // CORS 프록시를 통해 실제 KML 데이터 가져오기
    const proxies = [
      u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    ];
    for (const url of urls) {
      let fetched = false;
      for (const makeProxy of proxies) {
        try {
          const res = await fetch(makeProxy(url));
          if (!res.ok) continue;
          const kmlText = await res.text();
          if (!kmlText.includes('<')) continue;
          const xml2 = parser.parseFromString(kmlText, 'text/xml');
          const docEls2 = xml2.getElementsByTagName('Document');
          const root2 = docEls2.length ? docEls2[0] : xml2.documentElement;
          let hasFolders2 = false;
          for (const child of root2.children) {
            const tag = child.localName || child.tagName;
            if (tag === 'Folder') { parseFolder(child, '기타'); hasFolders2 = true; }
          }
          if (!hasFolders2) {
            const allPm = xml2.getElementsByTagName('Placemark');
            for (let i = 0; i < allPm.length; i++) {
              const p = extractPlace(allPm[i], '기타');
              if (p) places.push(p);
            }
          }
          if (places.length > 0) { fetched = true; break; }
        } catch(e) { console.warn('KML fetch 실패:', e); }
      }
      if (fetched) break;
      // 모든 프록시 실패 시 URL 직접 안내
      if (!fetched && places.length === 0) {
        const directUrl = url.includes('forcekml') ? url : url + (url.includes('?') ? '&' : '?') + 'forcekml=1';
        if (window.confirm(`자동 가져오기에 실패했습니다.\n\n아래 방법으로 직접 KML 파일을 다운받아 가져오기 해주세요:\n\n1. 아래 URL을 브라우저 주소창에 붙여넣기\n2. 파일이 다운로드되면 그 파일로 다시 KML 가져오기\n\n[확인]을 누르면 URL이 클립보드에 복사됩니다.`)) {
          navigator.clipboard.writeText(directUrl).catch(()=>{});
        }
      }
    }
  } else {
    // 일반 KML: Document 또는 최상위에서 시작
    const docEls = xml.getElementsByTagName('Document');
    const root = docEls.length ? docEls[0] : xml.documentElement;
    let hasFolders = false;
    for (const child of root.children) {
      const tag = child.localName || child.tagName;
      if (tag === 'Folder') { parseFolder(child, '기타'); hasFolders = true; }
    }
    if (!hasFolders) {
      const allPm = xml.getElementsByTagName('Placemark');
      for (let i = 0; i < allPm.length; i++) {
        const p = extractPlace(allPm[i], '기타');
        if (p) places.push(p);
      }
    }
  }

  if (places.length === 0) {
    alert('가져올 장소가 없습니다.\n\n구글 My Maps에서 KML 내보내기 시 "네트워크 링크 유지" 옵션을 해제하거나,\n지도가 공개(공유) 상태인지 확인해 주세요.');
    return;
  }

  if (!window.confirm(`${places.length}개 장소를 가져오시겠습니까?\n\n기존 장소는 유지됩니다.`)) return;

  // Supabase 일괄 저장
  const rows = places.map((p, i) => ({ tab_id: tabId, data: p, sort_order: i }));
  const batchSize = 50;
  for (let i = 0; i < rows.length; i += batchSize) {
    await fetch(`${SB_URL}/rest/v1/tab_items`, {
      method: 'POST',
      headers: SB_H,
      body: JSON.stringify(rows.slice(i, i + batchSize))
    });
  }

  // 지도 새로고침
  const items = await sbGet('tab_items', `tab_id=eq.${tabId}&order=sort_order.asc,created_at.asc`);
  renderMap(document.getElementById('tabContent'), currentTab, items);
}

function parseGmapUrl(url) {
  if (!url) return;
  let lat, lng, name = '';

  // @lat,lng,zoom 형식 (가장 일반적)
  let m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) { lat = parseFloat(m[1]); lng = parseFloat(m[2]); }

  // ?q=lat,lng 형식
  if (!lat) { m = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/); if (m) { lat=parseFloat(m[1]); lng=parseFloat(m[2]); } }

  // ll=lat,lng 형식
  if (!lat) { m = url.match(/ll=(-?\d+\.\d+),(-?\d+\.\d+)/); if (m) { lat=parseFloat(m[1]); lng=parseFloat(m[2]); } }

  // !3d lat !4d lng 형식 (Place ID URL)
  if (!lat) { m = url.match(/!3d(-?\d+\.\d+).*!4d(-?\d+\.\d+)/); if (m) { lat=parseFloat(m[1]); lng=parseFloat(m[2]); } }

  // 장소명 추출 (/maps/place/이름/)
  m = url.match(/maps\/place\/([^/@?]+)/);
  if (m) name = decodeURIComponent(m[1].replace(/\+/g,' ')).replace(/_/g,' ');

  if (lat && lng) {
    document.getElementById('mLat').value = lat.toFixed(6);
    document.getElementById('mLng').value = lng.toFixed(6);
    if (name && !document.getElementById('mName').value) document.getElementById('mName').value = name;
    if (window.leafletMap) window.leafletMap.setView([lat, lng], 16);
  }
}

async function addMapPlace(tabId) {
  const name = document.getElementById('mName').value.trim();
  const lat = parseFloat(document.getElementById('mLat').value);
  const lng = parseFloat(document.getElementById('mLng').value);
  if (!name) { alert('장소 이름을 입력하세요'); return; }
  if (!lat || !lng) { alert('지도를 클릭하거나 좌표를 입력하세요'); return; }
  const desc = document.getElementById('mDesc').value.trim();
  const layer = document.getElementById('mLayer').value.trim();
  await sbPost('tab_items', { tab_id: tabId, data: { name, desc, lat, lng, layer }, sort_order: 0 });
  ['mGurl','mName','mDesc','mLayer','mLat','mLng'].forEach(id=>document.getElementById(id).value='');
  const tab = currentTab;
  const items = await sbGet('tab_items', `tab_id=eq.${tabId}&order=sort_order.asc,created_at.asc`);
  renderMap(document.getElementById('tabContent'), tab, items);
}

// ── FILE / LINK ──
function renderFiles(container, tab, items) {
  const fileIcon = t => {
    if (t.includes('pdf')) return '📄';
    if (t.includes('image') || t.includes('jpg') || t.includes('png')) return '🖼️';
    if (t.includes('word') || t.includes('doc')) return '📝';
    if (t.includes('excel') || t.includes('xls')) return '📊';
    return '📎';
  };
  container.innerHTML = `<div class="pane-wrap">
    <div class="pane-header"><div class="pane-title">📎 ${tab.title}</div><span class="badge">${items.length}개</span></div>
    <div class="form-box">
      <div class="form-row">
        <input class="f-inp" id="fName" placeholder="파일/링크 이름 *">
        <input class="f-inp" id="fType" placeholder="종류 (예: PDF, 이미지, 링크)">
      </div>
      <div class="form-row">
        <input class="f-inp" id="fUrl" placeholder="URL 또는 링크 주소">
        <input class="f-inp" id="fNote" placeholder="비고">
        <button class="f-btn" onclick="addFile('${tab.id}')">추가</button>
      </div>
    </div>
    <div class="file-list">${items.map(item=>`
      <div class="file-item">
        <div class="file-icon">${fileIcon(item.data.type||'')}</div>
        <div class="file-info">
          <div class="file-name">${item.data.name||''}</div>
          <div class="file-meta">${item.data.type||''}${item.data.note?' · '+item.data.note:''}</div>
          ${item.data.url?`<a class="file-link" href="${item.data.url}" target="_blank">${item.data.url}</a>`:''}
        </div>
        <button class="del-btn" onclick="deleteItem('${item.id}','${tab.id}')">삭제</button>
      </div>`).join('')}
    </div>
    ${!items.length?`<div class="empty-state"><div class="icon">📎</div><p>파일이나 링크를 추가해 보세요</p></div>`:''}
  </div>`;
}

async function addFile(tabId) {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('이름을 입력하세요'); return; }
  const data = {
    name, type: document.getElementById('fType').value.trim(),
    url: document.getElementById('fUrl').value.trim(),
    note: document.getElementById('fNote').value.trim()
  };
  await sbPost('tab_items', { tab_id: tabId, data, sort_order: 0 });
  ['fName','fType','fUrl','fNote'].forEach(id=>document.getElementById(id).value='');
  const tab = currentTab;
  const items = await sbGet('tab_items', `tab_id=eq.${tabId}&order=sort_order.asc,created_at.asc`);
  renderFiles(document.getElementById('tabContent'), tab, items);
}

// ── Common Delete ──
async function deleteItem(id, tabId) {
  if (!confirm('삭제하시겠습니까?')) return;
  await sbDelete('tab_items', id);
  const tab = currentTab;
  const items = await sbGet('tab_items', `tab_id=eq.${tabId}&order=sort_order.asc,created_at.asc`);
  const container = document.getElementById('tabContent');
  if (tab.type === 'schedule') renderSchedItems(items, currentSchedDate);
  else if (tab.type === 'checklist') renderChecklist(container, tab, items);
  else if (tab.type === 'list') renderList(container, tab, items);
  else if (tab.type === 'card') renderCards(container, tab, items);
  else if (tab.type === 'map') renderMap(container, tab, items);
  else if (tab.type === 'file') renderFiles(container, tab, items);
  else if (tab.type === 'budget') renderBudget(container, tab, items);
}

// ── BUDGET ──
function calcBudget(items, currency) {
  const rows = items.filter(i => i.data.currency === currency);
  const income = rows.filter(i=>i.data.type==='in').reduce((s,i)=>s+parseFloat((i.data.amount||'0').replace(/,/g,'')),0);
  const expense = rows.filter(i=>i.data.type==='out').reduce((s,i)=>s+parseFloat((i.data.amount||'0').replace(/,/g,'')),0);
  return { income, expense, balance: income - expense };
}

function renderBudget(container, tab, items) {
  const sym = { krw:'₩', eur:'€' };
  const summaryHtml = ['krw','eur'].map(cur => {
    const { income, expense, balance } = calcBudget(items, cur);
    const label = cur === 'krw' ? '원화 (KRW)' : '유로 (EUR)';
    const balColor = balance >= 0 ? '#a5d6a7' : '#ef9a9a';
    return `<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;flex:1">
      <div style="font-size:12px;font-weight:800;color:var(--sub);margin-bottom:10px">${label}</div>
      <div style="display:flex;gap:16px;font-size:13px">
        <div><div style="color:var(--sub);font-size:11px">입금</div><div style="color:#a5d6a7;font-weight:700">${sym[cur]}${income.toLocaleString()}</div></div>
        <div><div style="color:var(--sub);font-size:11px">출금</div><div style="color:#ef9a9a;font-weight:700">${sym[cur]}${expense.toLocaleString()}</div></div>
        <div><div style="color:var(--sub);font-size:11px">잔액</div><div style="color:${balColor};font-weight:800">${sym[cur]}${balance.toLocaleString()}</div></div>
      </div>
    </div>`;
  }).join('');

  const rowsHtml = ['krw','eur'].map(cur => {
    const curItems = items.filter(i=>i.data.currency===cur);
    const label = cur==='krw'?'원화 (KRW)':'유로 (EUR)';
    const inRows = curItems.filter(i=>i.data.type==='in');
    const outRows = curItems.filter(i=>i.data.type==='out');
    const mkRows = arr => arr.map(item=>`
      <tr>
        <td>${item.data.date||''}</td>
        <td>${item.data.item||''}</td>
        <td style="color:${item.data.type==='in'?'#a5d6a7':'#ef9a9a'};font-weight:700">${sym[cur]}${item.data.amount||''}</td>
        <td style="color:var(--sub)">${item.data.note||''}</td>
        <td><button class="del-btn" onclick="deleteItem('${item.id}','${tab.id}')">삭제</button></td>
      </tr>`).join('');
    return `<div style="margin-bottom:20px">
      <div style="font-size:13px;font-weight:800;color:#9fa8da;margin-bottom:8px">${label}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div style="font-size:11px;font-weight:700;color:#a5d6a7;margin-bottom:6px">▶ 입금</div>
          <div style="overflow-x:auto"><table class="list-table"><thead><tr><th>날짜</th><th>항목</th><th>금액</th><th>비고</th><th></th></tr></thead><tbody>${mkRows(inRows)}</tbody></table></div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#ef9a9a;margin-bottom:6px">◀ 출금</div>
          <div style="overflow-x:auto"><table class="list-table"><thead><tr><th>날짜</th><th>항목</th><th>금액</th><th>비고</th><th></th></tr></thead><tbody>${mkRows(outRows)}</tbody></table></div>
        </div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="pane-wrap">
    <div class="pane-header"><div class="pane-title">💰 ${tab.title}</div></div>
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">${summaryHtml}</div>
    <div class="form-box">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--accent2)">＋ 내역 추가</div>
      <div class="form-row">
        <select class="f-sel" id="bCur"><option value="krw">₩ 원화</option><option value="eur">€ 유로</option></select>
        <select class="f-sel" id="bType"><option value="in">▶ 입금</option><option value="out">◀ 출금</option></select>
        <input class="f-inp" id="bDate" type="date">
        <input class="f-inp" id="bItem" placeholder="항목 *">
      </div>
      <div class="form-row">
        <input class="f-inp" id="bAmount" placeholder="금액 *">
        <input class="f-inp" id="bNote" placeholder="비고">
        <button class="f-btn" onclick="addBudgetItem('${tab.id}')">추가</button>
      </div>
    </div>
    ${rowsHtml}
  </div>`;
}

async function addBudgetItem(tabId) {
  const item = document.getElementById('bItem').value.trim();
  const amount = document.getElementById('bAmount').value.trim();
  if (!item || !amount) { alert('항목과 금액을 입력하세요'); return; }
  const data = {
    currency: document.getElementById('bCur').value,
    type: document.getElementById('bType').value,
    date: document.getElementById('bDate').value,
    item, amount,
    note: document.getElementById('bNote').value.trim()
  };
  await sbPost('tab_items', { tab_id: tabId, data, sort_order: 0 });
  ['bDate','bItem','bAmount','bNote'].forEach(id=>document.getElementById(id).value='');
  const tab = currentTab;
  const items = await sbGet('tab_items', `tab_id=eq.${tabId}&order=sort_order.asc,created_at.asc`);
  renderBudget(document.getElementById('tabContent'), tab, items);
}

    const p = projects.find(x => x.id === pid);
    if (p) openProject(pid);
  } else if (isNew) {

  }
})();
